pre-push:
  jobs:
    - name: packages audit
      tags:
        - frontend
        - security
      run: bun audit

    - name: build
      run: bun run build

pre-commit:
  jobs:
    - name: ultracite fix
      run: bun x ultracite fix {staged_files}
      stage_fixed: true

    
    